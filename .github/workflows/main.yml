name: AI Parse & Post Articles

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # ИСПРАВЛЕНО: Не отменяем текущий процесс, чтобы он успел сохранить posted.json
  cancel-in-progress: false 

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    # 05:30 - 06:30 утра (по Индокитаю)
    - cron: '30 22-23 * * *'
    # 07:30 - 18:30 (по Индокитаю)
    - cron: '30 0-11 * * *'
    
env:
  POST_DELAY: 10
  BATCH_LIMIT: 10
  TELEGRAM_TOKEN:     ${{ secrets.TELEGRAM_TOKEN }}
  TELEGRAM_CHANNEL:   ${{ secrets.TELEGRAM_CHANNEL }}
  WG_CONFIG:          ${{ secrets.WG_CONFIG }}
  FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
  FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}

jobs:
  build-and-publish:
    name: Parse and Publish (Khmertimes)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          # Важно для правильного ребейза и сохранения истории json
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # --- Установка FFmpeg (нужен для video_processor.py, если используешь) ---
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install requirements
        run: |
          pip install --upgrade pip
          pip install --no-cache-dir curl_cffi requests beautifulsoup4
          if [ -f requirements-parser.txt ]; then pip install -r requirements-parser.txt; fi
          if [ -f requirements-poster.txt ]; then pip install -r requirements-poster.txt; fi
          if [ -f requirements-video.txt ]; then pip install -r requirements-video.txt; fi
      
      - name: Install & Connect Cloudflare WARP
        run: |
          # 1. Установка
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-warp.list
          sudo apt-get update && sudo apt-get install -y cloudflare-warp
          
          # 2. Демон уже запущен установщиком. Для надежности просто рестартуем его:
          sudo systemctl restart warp-svc
          
          # Ждем пару секунд, чтобы сокет точно создался
          sleep 3
          
          # 3. Настройка и подключение
          warp-cli --accept-tos registration new
          warp-cli --accept-tos mode proxy
          warp-cli --accept-tos proxy port 40000
          warp-cli --accept-tos connect
          
          # 4. Проверка статуса без слепых ожиданий
          echo "⏳ Ожидание статуса Connected..."
          for i in {1..10}; do
            STATUS=$(warp-cli --accept-tos status)
            if echo "$STATUS" | grep -q "Connected"; then
              echo "✅ WARP успешно подключен!"
              break
            fi
            sleep 3
          done

      - name: "🌍 Verify Proxy IP"
        run: |
          echo "External IP (via WARP):"
          curl -s --retry 5 --retry-delay 2 --socks5-hostname 127.0.0.1:40000 https://ifconfig.me
 
      - name: Install dependencies
        run: pip install yt-dlp
 
      - name: "Run Parser"
        id: parse_step
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          set -o pipefail
          python3 main.py \
            --base-url "https://www.khmertimeskh.com" \
            --slug "national" \
            --limit $BATCH_LIMIT \
            --lang 'ru' \
            --posted-state-file articles/posted.json \
            --stopwords-file stopwords.txt 2>&1 | tee parser_output.txt
 
          echo "=== DEBUG: searching status ==="
          grep "NEW_ARTICLES_STATUS:" parser_output.txt || echo "NOT FOUND"
 
          if grep -q "NEW_ARTICLES_STATUS:true" parser_output.txt; then
            echo "new_articles_found=true" >> $GITHUB_OUTPUT
            echo "Status: true"
          else
            echo "new_articles_found=false" >> $GITHUB_OUTPUT
            echo "Status: false"
          fi
 
      - name: Run poster
        if: steps.parse_step.outputs.new_articles_found == 'true'
        run: |
          python3 poster.py \
            --parsed-dir articles \
            --state-file articles/posted.json \
            --limit $BATCH_LIMIT
 
      - name: Commit and Push (Conflict Resistant)
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
 
          [ -f "articles/posted.json" ] && git add articles/posted.json
 
          if ! git diff --cached --quiet; then
            git commit -m "chore: update posted.json"
            git pull --rebase -X ours origin main
            git push origin main
          else
            echo "No changes to posted.json"
          fi
